<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 170" width="320" height="170" font-family="Georgia, 'Times New Roman', serif">
  <!-- internal index (bond) joining M and N -->
  <line x1="130" y1="85" x2="190" y2="85" stroke="#000000" stroke-width="2.6"/>
  <text x="160" y="74" font-size="13" font-style="italic" fill="#000000" text-anchor="middle">j</text>
  <!-- external (dangling) indices -->
  <line x1="113" y1="85" x2="61" y2="85" stroke="#000000" stroke-width="2"/>
  <line x1="207" y1="85" x2="207" y2="33" stroke="#000000" stroke-width="2"/>
  <line x1="207" y1="85" x2="259" y2="85" stroke="#000000" stroke-width="2"/>
  <text x="47" y="89" font-size="14" font-style="italic" fill="#000000" text-anchor="middle">i</text>
  <text x="207" y="25" font-size="14" font-style="italic" fill="#000000" text-anchor="middle">k</text>
  <text x="273" y="89" font-size="14" font-style="italic" fill="#000000" text-anchor="middle">l</text>
  <!-- tensors -->
  <circle cx="113" cy="85" r="18" fill="#87a2d5" stroke="#000000" stroke-width="2.2"/>
  <text x="113" y="90" font-size="15" font-style="italic" fill="#000000" text-anchor="middle">M</text>
  <circle cx="207" cy="85" r="18" fill="#87a2d5" stroke="#000000" stroke-width="2.2"/>
  <text x="207" y="90" font-size="15" font-style="italic" fill="#000000" text-anchor="middle">N</text>
</svg>
