<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 150" width="360" height="150" font-family="Georgia, 'Times New Roman', serif">
  <!-- internal bond indices -->
  <line x1="40" y1="75" x2="320" y2="75" stroke="#000000" stroke-width="2.6"/>
  <!-- upper and lower external indices on every site -->
  <g stroke="#000000" stroke-width="2">
    <line x1="40"  y1="75" x2="40"  y2="43"/><line x1="40"  y1="75" x2="40"  y2="107"/>
    <line x1="110" y1="75" x2="110" y2="43"/><line x1="110" y1="75" x2="110" y2="107"/>
    <line x1="180" y1="75" x2="180" y2="43"/><line x1="180" y1="75" x2="180" y2="107"/>
    <line x1="250" y1="75" x2="250" y2="43"/><line x1="250" y1="75" x2="250" y2="107"/>
    <line x1="320" y1="75" x2="320" y2="43"/><line x1="320" y1="75" x2="320" y2="107"/>
  </g>
  <!-- square factor tensors -->
  <g fill="#87a2d5" stroke="#000000" stroke-width="2.2">
    <rect x="25"  y="60" width="30" height="30" rx="3"/>
    <rect x="95"  y="60" width="30" height="30" rx="3"/>
    <rect x="165" y="60" width="30" height="30" rx="3"/>
    <rect x="235" y="60" width="30" height="30" rx="3"/>
    <rect x="305" y="60" width="30" height="30" rx="3"/>
  </g>
</svg>
