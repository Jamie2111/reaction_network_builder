<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 130" width="360" height="130" font-family="Georgia, 'Times New Roman', serif">
  <!-- internal bond indices -->
  <line x1="40" y1="60" x2="320" y2="60" stroke="#000000" stroke-width="2.6"/>
  <!-- per-site external (occupation) indices and factor tensors -->
  <g stroke="#000000" stroke-width="2">
    <line x1="40"  y1="60" x2="40"  y2="92"/>
    <line x1="110" y1="60" x2="110" y2="92"/>
    <line x1="180" y1="60" x2="180" y2="92"/>
    <line x1="250" y1="60" x2="250" y2="92"/>
    <line x1="320" y1="60" x2="320" y2="92"/>
  </g>
  <g font-size="13" font-style="italic" fill="#000000" text-anchor="middle">
    <text x="40"  y="112">n<tspan dy="3" font-size="9">1</tspan></text>
    <text x="110" y="112">n<tspan dy="3" font-size="9">2</tspan></text>
    <text x="180" y="112">n<tspan dy="3" font-size="9">3</tspan></text>
    <text x="250" y="112">n<tspan dy="3" font-size="9">4</tspan></text>
    <text x="320" y="112">n<tspan dy="3" font-size="9">5</tspan></text>
  </g>
  <g fill="#87a2d5" stroke="#000000" stroke-width="2.2">
    <circle cx="40"  cy="60" r="14"/>
    <circle cx="110" cy="60" r="14"/>
    <circle cx="180" cy="60" r="14"/>
    <circle cx="250" cy="60" r="14"/>
    <circle cx="320" cy="60" r="14"/>
  </g>
</svg>
